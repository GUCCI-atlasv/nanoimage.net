<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Free online image tools to compress, resize, crop, convert, and edit images in your browser. No signup required."
    />
    <meta name="theme-color" content="#fffdf8" />

    <!-- Canonical -->
    <link rel="canonical" href="https://nanoimage.net/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NanoImage" />
    <meta property="og:title" content="NanoImage - Free Image Tools Online" />
    <meta
      property="og:description"
      content="Free online image tools to compress, resize, crop, convert, and edit images in your browser. No signup required."
    />
    <meta property="og:url" content="https://nanoimage.net/" />
    <meta property="og:image" content="https://nanoimage.net/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@nanoimage" />
    <meta name="twitter:title" content="NanoImage - Free Image Tools Online" />
    <meta
      name="twitter:description"
      content="Free online image tools to compress, resize, crop, convert, and edit images in your browser. No signup required."
    />
    <meta name="twitter:image" content="https://nanoimage.net/assets/og-image.png" />

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://nanoimage.net/#website",
          "url": "https://nanoimage.net/",
          "name": "NanoImage",
          "description": "Free online image tools to compress, resize, crop, convert, and edit images in your browser.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://nanoimage.net/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://nanoimage.net/#app",
          "name": "NanoImage",
          "url": "https://nanoimage.net/",
          "applicationCategory": "MultimediaApplication",
          "operatingSystem": "Any",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "description": "Free online image tools to compress, resize, crop, convert, and edit images in your browser. No signup required."
        }
      ]
    }
    </script>

    <title>NanoImage - Free Image Tools Online</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
